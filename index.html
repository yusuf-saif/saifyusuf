<style>
body { font-family: 'Inter', sans-serif; }
h1 { font-family: 'Space Grotesk', sans-serif; }

/* Loader */
#loader {
  position: fixed;
  inset: 0;
  background: #F5F1E8;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.6s ease;
}
.dark #loader { background: #0a0a0a; }

.loader-dot {
  width: 8px;
  height: 8px;
  background: #0ea5e9;
  border-radius: 50%;
  animation: pulseDot 1.2s infinite ease-in-out;
}
@keyframes pulseDot {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.6); opacity: 1; }
}

/* Fade-in */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.2s ease forwards;
}
@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Grain */
.grain::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* Underline */
.name-underline {
  position: relative;
}
.name-underline::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -6px;
  width: 0%;
  height: 2px;
  background: #0ea5e9;
  transition: width 0.4s ease;
}
.name-underline:hover::after { width: 100%; }

/* Glow */
.dark .glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(14,165,233,0.25) 0%, transparent 70%);
  filter: blur(80px);
  z-index: -1;
  animation: pulseGlow 6s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%,100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}

/* Button Elevation */
.button-elevate {
  transition: all 0.3s ease;
}
.button-elevate:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  .fade-in, .dark .glow { animation: none; }
}

<script>
// Loader
window.addEventListener("load", () => {
const loader = document.getElementById("loader");
loader.style.opacity = "0";
setTimeout(() => loader.style.display = "none", 600);
});

// Typing
const roles = [
"Software Developer",
"Integration Specialist",
"Technical Project Manager",
"WooCommerce Integrations Specialist",
"Commerce Systems Builder"
];

const typingElement = document.getElementById("typing");
let roleIndex = 0, charIndex = 0, isDeleting = false;

function typeEffect() {
const currentRole = roles[roleIndex];
typingElement.textContent = currentRole.substring(0, charIndex);

if (!isDeleting && charIndex < currentRole.length) {
charIndex++;
setTimeout(typeEffect, 70);
} else if (isDeleting && charIndex > 0) {
charIndex--;
setTimeout(typeEffect, 40);
} else {
isDeleting = !isDeleting;
if (!isDeleting) roleIndex = (roleIndex + 1) % roles.length;
setTimeout(typeEffect, 1200);
}
}
typeEffect();

// Parallax
document.addEventListener("mousemove", (e) => {
const name = document.getElementById("name");
const x = (window.innerWidth/2 - e.clientX) / 100;
const y = (window.innerHeight/2 - e.clientY) / 100;
name.style.transform = `translate(${x}px, ${y}px)`;
});

// Theme Toggle + Shortcut
const toggle = document.getElementById("themeToggle");
const html = document.documentElement;

if (localStorage.getItem("theme") === "dark") {
html.classList.add("dark");
}

function toggleTheme() {
html.classList.toggle("dark");
localStorage.setItem("theme",
html.classList.contains("dark") ? "dark" : "light"
);
}

toggle.addEventListener("click", toggleTheme);

document.addEventListener("keydown", (e) => {
if (e.key.toLowerCase() === "d") toggleTheme();
});
</script>
